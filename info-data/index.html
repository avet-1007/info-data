<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>info-data</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <h1>info-data</h1>
  <span id="backend-badge" class="badge"></span>
  <div class="toolbar-spacer"></div>
  <button class="btn" id="btn-connect">💾 Подключить папку</button>
  <button class="btn btn-accent" id="btn-project">＋ Проект</button>
  <button class="btn" id="btn-folder">＋ Папка</button>
  <button class="btn" id="btn-document">＋ Документ</button>
  <button class="btn" id="btn-console">⌘ Консоль</button>
</div>

<!-- MAIN -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Файлы</span>
      <div id="sidebar-actions">
        <button class="icon-btn" id="hdr-project" title="Новый проект"></button>
        <button class="icon-btn" id="hdr-folder" title="Новая папка"></button>
        <button class="icon-btn" id="hdr-document" title="Новый документ"></button>
      </div>
    </div>
    <div id="tree"></div>
  </div>

  <div id="resizer"></div>

  <!-- WORKSPACE -->
  <div id="workspace">

    <!-- EDITOR -->
    <div id="editor-panel" style="display:none;">
      <div id="editor-header">
        <span id="editor-title"></span>
        <span id="lang-badge"></span>
        <div id="mode-switch">
          <button class="mode-btn" data-mode="edit">Редактор</button>
          <button class="mode-btn" data-mode="split">Сплит</button>
          <button class="mode-btn" data-mode="preview">Просмотр</button>
        </div>
        <span id="save-status"></span>
      </div>

      <div id="editor-area">
        <div id="edit-wrap">
          <pre id="highlight" aria-hidden="true"><code></code></pre>
          <textarea id="editor-textarea" spellcheck="false" autocomplete="off"
                    autocorrect="off" autocapitalize="off" wrap="soft"></textarea>
          <div id="monaco-host"></div>
        </div>
        <div id="split-resizer" title="Перетащите, чтобы изменить ширину"></div>
        <div id="preview-wrap">
          <div id="preview" class="markdown-body"></div>
          <iframe id="preview-frame" sandbox="allow-same-origin" referrerpolicy="no-referrer"></iframe>
        </div>
      </div>
    </div>

    <!-- WELCOME -->
    <div id="welcome">
      <div class="welcome-icon">🗂</div>
      <h2>info-data</h2>
      <p>Создайте проект или откройте документ</p>
      <p class="welcome-hint">Документы — в формате Markdown (.md). Откройте консоль кнопкой <b>⌘ Консоль</b>.</p>
    </div>

  </div>
</div>

<!-- CONSOLE PANEL -->
<div id="console-panel">
  <div id="console-resizer" title="Перетащите, чтобы изменить высоту"></div>
  <div id="console-header">
    <span>Консоль файловой системы</span>
    <span class="console-hint">help — список команд</span>
    <button id="console-close">✕</button>
  </div>
  <div id="console-output"></div>
  <div id="console-hints"></div>
  <div id="console-inputline">
    <span id="console-prompt">/ ❯</span>
    <div id="console-field">
      <div id="console-ghost"><span class="ghost-typed"></span><span class="ghost-rest"></span></div>
      <input type="text" id="console-input" spellcheck="false" autocomplete="off" placeholder="введите команду…  (Tab — дополнить)">
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu"></div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title"></h3>
    <input type="text" id="modal-input" autocomplete="off">
    <div id="modal-actions">
      <button class="btn" id="modal-cancel">Отмена</button>
      <button class="btn btn-accent" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<script src="fs.js"></script>
<script src="markdown.js"></script>
<script src="filetypes.js"></script>
<script src="icons.js"></script>
<script src="editor.js"></script>
<script src="console.js"></script>
<script src="app.js"></script>
</body>
</html>
